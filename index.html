<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東福推飯の名刺作成ジェネレーター</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --bg-color: #f0f3f5;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #555555;
            --accent-red: #e60012;
            --border-color: #dcdde1;
            --btn-gray: #7f8c8d;
            --btn-blue: #3498db;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            flex-direction: row;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            padding: 35px;
            gap: 40px;
            max-width: 850px;
            width: 100%;
            align-items: center;
        }

        /* 入力フォームエリア */
        .form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-section h2 {
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            border-left: 4px solid var(--accent-red);
            padding-left: 12px;
        }

        .info-notice {
            font-size: 12px;
            color: #2c3e50;
            background-color: #ebf5fb;
            border-left: 4px solid var(--btn-blue);
            padding: 12px;
            margin-bottom: 20px;
            margin-top: 10px;
            border-radius: 0 4px 4px 0;
            line-height: 1.6;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
        }

        .input-group input, .input-group select {

            width: 100%;
